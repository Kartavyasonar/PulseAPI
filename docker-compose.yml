version: '3.9'

services:
  gateway:
    build: ./gateway
    ports: ["3000:3000", "3001:3001"]
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://pulse:pulse@postgres:5432/pulseapi
      - JWT_SECRET=supersecretjwtkey123
      - ADMIN_KEY=admin-secret-key
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./gateway/config.json:/app/config.json
    restart: unless-stopped

  upstream1:
    build: ./upstream-mock
    environment: [PORT=4001, SERVICE_NAME=upstream-1, FAIL_RATE=0.05]
    ports: ["4001:4001"]

  upstream2:
    build: ./upstream-mock
    environment: [PORT=4002, SERVICE_NAME=upstream-2, FAIL_RATE=0.02]
    ports: ["4002:4002"]

  upstream3:
    build: ./upstream-mock
    environment: [PORT=4003, SERVICE_NAME=upstream-3, FAIL_RATE=0.0]
    ports: ["4003:4003"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:15-alpine
    environment: [POSTGRES_USER=pulse, POSTGRES_PASSWORD=pulse, POSTGRES_DB=pulseapi]
    ports: ["5432:5432"]
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulse -d pulseapi"]
      interval: 5s
      timeout: 3s
      retries: 10

  dashboard:
    build: ./dashboard
    ports: ["5173:80"]
    depends_on: [gateway]

volumes:
  pg_data:

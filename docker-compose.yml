version: '3.9'

services:
  gateway:
    build: ./gateway
    ports: ["3000:3000"]
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://pulse:pulse@postgres:5432/pulseapi
      - JWT_SECRET=supersecretjwtkey123
      - ADMIN_KEY=admin-secret-key
      - JAEGER_ENDPOINT=http://jaeger:14268/api/traces
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_TOPIC=request-logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ./gateway/config.json:/app/config.json
    restart: unless-stopped

  kafka-consumer:
    build: ./kafka-consumer
    environment:
      - DATABASE_URL=postgresql://pulse:pulse@postgres:5432/pulseapi
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_TOPIC=request-logs
      - KAFKA_GROUP_ID=pulseapi-log-writer
      - BATCH_SIZE=500
      - FLUSH_INTERVAL=1000
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_HEAP_OPTS: "-Xmx256m -Xms128m"
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      CLUSTER_ID: "pulseapi-kafka-cluster-1"
      KAFKA_LOG_RETENTION_HOURS: 24
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  upstream1:
    build: ./upstream-mock
    environment: [PORT=4001, SERVICE_NAME=upstream-1, FAIL_RATE=0.05]
    ports: ["4001:4001"]

  upstream2:
    build: ./upstream-mock
    environment: [PORT=4002, SERVICE_NAME=upstream-2, FAIL_RATE=0.02]
    ports: ["4002:4002"]

  upstream3:
    build: ./upstream-mock
    environment: [PORT=4003, SERVICE_NAME=upstream-3, FAIL_RATE=0.0]
    ports: ["4003:4003"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:15-alpine
    environment: [POSTGRES_USER=pulse, POSTGRES_PASSWORD=pulse, POSTGRES_DB=pulseapi]
    ports: ["5432:5432"]
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulse -d pulseapi"]
      interval: 5s
      timeout: 3s
      retries: 10

  dashboard:
    build: ./dashboard
    ports: ["5173:80"]
    depends_on: [gateway]

  jaeger:
    image: jaegertracing/all-in-one:1.52
    ports:
      - "16686:16686"   # Jaeger UI
      - "14268:14268"   # HTTP collector
    environment:
      - COLLECTOR_OTLP_ENABLED=true

  prometheus:
    image: prom/prometheus:v2.48.0
    ports:
      - "9090:9090"     # Prometheus UI + query API
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'   # allows POST /-/reload to hot-reload config
    depends_on: [gateway]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.2.2
    ports:
      - "3001:3000"     # Grafana UI (3000 is taken by gateway)
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=pulse
      - GF_AUTH_ANONYMOUS_ENABLED=true      # lets you view dashboards without login
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on: [prometheus]
    restart: unless-stopped

volumes:
  pg_data:
  prometheus_data:
  grafana_data:
  kafka_data:

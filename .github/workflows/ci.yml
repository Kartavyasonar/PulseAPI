name: PulseAPI CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 5
      postgres:
        image: postgres:15-alpine
        env: { POSTGRES_USER: pulse, POSTGRES_PASSWORD: pulse, POSTGRES_DB: pulseapi }
        ports: ["5432:5432"]
        options: --health-cmd "pg_isready -U pulse" --health-interval 5s --health-timeout 3s --health-retries 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: npm, cache-dependency-path: gateway/package-lock.json }

      - run: npm ci
        working-directory: gateway

      - run: psql postgresql://pulse:pulse@localhost:5432/pulseapi -f scripts/init.sql

      - run: npm test -- --coverage --coverageReporters=text --coverageReporters=lcov
        working-directory: gateway
        env:
          DATABASE_URL: postgresql://pulse:pulse@localhost:5432/pulseapi
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret
          ADMIN_KEY: test-admin-key

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: gateway/coverage/lcov.info
          flags: unit
          fail_ci_if_error: false

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: ./gateway
          push: false
          tags: pulseapi-gateway:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

name: PulseAPI CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 5
      postgres:
        image: postgres:15-alpine
        env: { POSTGRES_USER: pulse, POSTGRES_PASSWORD: pulse, POSTGRES_DB: pulseapi }
        ports: ["5432:5432"]
        options: --health-cmd "pg_isready -U pulse" --health-interval 5s --health-timeout 3s --health-retries 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: npm, cache-dependency-path: gateway/package-lock.json }

      - run: npm ci
        working-directory: gateway

      - run: psql postgresql://pulse:pulse@localhost:5432/pulseapi -f scripts/init.sql

      - run: npm test -- --coverage --coverageReporters=text --coverageReporters=lcov
        working-directory: gateway
        env:
          DATABASE_URL: postgresql://pulse:pulse@localhost:5432/pulseapi
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret
          ADMIN_KEY: test-admin-key

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: gateway/coverage/lcov.info
          flags: unit
          fail_ci_if_error: false

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: ./gateway
          push: false
          tags: pulseapi-gateway:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  integration:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - run: docker compose up -d --build
        timeout-minutes: 5

      - name: wait for gateway
        run: |
          for i in {1..30}; do
            curl -sf http://localhost:3000/health && echo "ready" && break
            sleep 2
          done

      - run: curl -sf http://localhost:3000/api/test | jq .
      - run: curl -sf -H "X-Api-Key: admin-secret-key" http://localhost:3000/admin/routes | jq .

      - name: test hot route add
        run: |
          curl -sf -X POST http://localhost:3000/admin/routes \
            -H "X-Api-Key: admin-secret-key" -H "Content-Type: application/json" \
            -d '{"id":"ci","pathPrefix":"/ci","upstreams":[{"url":"http://upstream3:4003","weight":1}]}' | jq .
          curl -sf http://localhost:3000/ci/ping | jq .

      - if: failure()
        run: docker compose logs gateway

      - if: always()
        run: docker compose down -v

  k6-smoke:
    name: k6 Smoke Test
    runs-on: ubuntu-latest
    needs: integration

    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg --no-default-keyring \
            --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] \
            https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -qq && sudo apt-get install -y k6

      - name: Start full stack
        run: |
          docker compose up -d --build
          for i in {1..30}; do
            curl -sf http://localhost:3000/health && echo "gateway ready" && break
            sleep 2
          done

      - name: Run k6 smoke test
        run: k6 run load-tests/smoke.js
        env:
          GATEWAY_URL: http://localhost:3000
          ADMIN_KEY: admin-secret-key

      - if: always()
        run: docker compose down -v
